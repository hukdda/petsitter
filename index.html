    <section id="faq" class="faq section">
        <div class="container">
            <h2 class="section-title">자주 묻는 질문 (FAQ)</h2>
            <details class="faq-item"><summary>Q. 어떤 서비스를 제공하나요?</summary><div class="faq-answer"><p>저희는 보호자님이 부재중일 때, 펫시터가 고객님의 집으로 직접 방문하여 아이를 돌봐드리는 '방문 돌봄' 서비스를 전문으로 합니다. 정해진 시간 동안 식사 급여, 배변 처리, 실내 놀이, 산책 등을 진행하며, 요청 시 목욕과 같은 추가 케어도 가능합니다.</p></div></details>
            <details class="faq-item"><summary>Q. 예약은 어떻게 하나요?</summary><div class="faq-answer"><p>웹사이트 상단의 '실시간 견적 및 예약' 버튼을 누르시면, 모든 할증이 자동으로 계산되는 견적 페이지로 이동합니다. 그곳에서 예상 금액을 확인하신 후, 예약 정보를 입력하시면 간편하게 접수가 완료됩니다.</p></div></details>
            <details class="faq-item"><summary>Q. 추가 요금이 발생하는 경우가 있나요?</summary><div class="faq-answer"><p>네, 기본적인 서비스 요금 외에 아래와 같은 경우 할증 및 추가 요금이 발생할 수 있습니다. 모든 할증은 실시간 견적 페이지에 자동으로 반영됩니다.</p><table class="faq-table"><thead><tr><th>할증 구분</th><th>적용 조건</th><th>추가 요금</th></tr></thead><tbody><tr><td>당일 예약 할증</td><td>서비스 이용 당일 예약 접수 시</td><td>+ 10,000원</td></tr><tr><td>주말/공휴일 할증</td><td>토, 일요일 및 법정 공휴일</td><td>+ 5,000원</td></tr><tr><td>야간 할증</td><td>오후 8시 ~ 다음날 오전 8시</td><td>+ 5,000원</td></tr><tr><td>명절 할증</td><td>설/추석 연휴 기간 (별도 공지)</td><td>+ 10,000원</td></tr><tr><td>다견/다묘 할증</td><td>2마리부터, 1마리당 추가</td><td>+ 5,000원</td></tr><tr><td>특수 케어 할증</td><td>공격성, 약물 투여, 중/대형견 등</td><td>별도 협의</td></tr></tbody></table></div></details>
            <details class="faq-item"><summary>Q. 취소 및 환불 규정은 어떻게 되나요?</summary><div class="faq-answer"><p>저희는 다음과 같은 기준으로 취소 및 환불을 처리해 드립니다.  
- 서비스 시작 72시간 전 취소: <strong>전액 환불</strong>  
- 서비스 시작 48시간 전 취소: <strong>결제 금액의 70% 환불</strong>  
- 서비스 시작 24시간 전 취소: <strong>결제 금액의 50% 환불</strong>  
- 서비스 시작 24시간 이내 또는 서비스 시작 후 취소: <strong>환불 불가</strong>  
<small>* 예약 확정 시 펫시터의 스케줄이 고정되므로, 부득이하게 수수료가 발생하는 점 양해 부탁드립니다.</small></p></div></details>
