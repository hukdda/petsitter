    <script>
      window.__NEXPAY_DIAG = { logs: [], status: 'STARTING' };
      function log(m) { window.__NEXPAY_DIAG.logs.push(new Date().toLocaleTimeString() + ': ' + m); console.log('[SDK]', m); }

      function detectEngine() {
        const engine = window.NexPay || window.MePay || window.MagNexPay || window.mepay || window.nexpay;
        if (engine && typeof (engine.pay || engine.open || engine.request_pay) === 'function') {
          window.NexPay = engine;
          return true;
        }
        return false;
      }

      async function tryLoad(url, name) {
        log('Attempting ' + name + '...');
        try {
          const s = document.createElement('script');
          s.src = url;
          s.async = true;
          const p = new Promise((resolve, reject) => {
            s.onload = () => detectEngine() ? resolve() : reject('OBJ_MISSING');
            s.onerror = () => reject('NETWORK_ERROR');
            setTimeout(() => reject('TIMEOUT'), 4500);
          });
          document.head.appendChild(s);
          await p;
          log('✅ ' + name + ' LOADED');
          window.__NEXPAY_DIAG.status = 'LOADED';
          window.__NEXPAY_DIAG.source = name;
          return true;
        } catch (e) {
          log('❌ ' + name + ' FAILED: ' + e);
          return false;
        }
      }

      (async () => {
        const domain = window.location.hostname || 'lovelypetsitter.com';
        // 1. 보안 프록시 우선 시도 (가장 안정적)
        if (await tryLoad('/api/proxy-sdk?domain=' + domain, 'SECURE_PROXY_V3')) return;
        // 2. 외부 다이렉트 시도
        if (await tryLoad('https://dev01.ver.ne.magnesy.com/sdk/js/mepay.js', 'MAGNESY_DIRECT')) return;
        window.__NEXPAY_DIAG.status = 'FAIL';
      })();
    </script>
