<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 견적 계산기 - 펫시터의 정석</title>
    <!-- 사장님의 기존 CSS 파일 경로는 그대로 유지해야 합니다. -->
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <header>
        <!-- 헤더 내용은 사장님의 기존 코드를 그대로 유지합니다. -->
        <h1>펫시터의 정석</h1>
        <nav>
            <a href="index.html">홈</a>
            <a href="calculator.html">실시간 견적</a>
        </nav>
    </header>

    <main>
        <section class="calculator-section">
            <div class="container">
                <h2>실시간 견적 계산기</h2>
                <p>간단한 정보 입력으로 예상 비용을 바로 확인해보세요.</p>

                <div class="calculator-form">
                    <div class="form-group">
                        <label for="service">서비스 종류</label>
                        <select id="service">
                            <option value="0" data-service-name="선택안함">-- 서비스를 선택해주세요 --</option>
                            <option value="25000" data-service-name="방문돌봄 30분">방문돌봄 30분 (25,000원)</option>
                            <option value="30000" data-service-name="방문돌봄 60분">방문돌봄 60분 (30,000원)</option>
                            <option value="35000" data-service-name="산책 포함 60분">산책 포함 60분 (35,000원)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="start-date">방문 시작일</label>
                        <input type="date" id="start-date">
                    </div>

                    <div class="form-group">
                        <label for="end-date">방문 종료일</label>
                        <input type="date" id="end-date">
                    </div>

                    <div class="form-group">
                        <label for="visit-time">방문 시간</label>
                        <select id="visit-time"></select>
                    </div>

                    <div class="form-group">
                        <label for="pet-count">반려동물 수</label>
                        <select id="pet-count">
                            <option value="1">1마리</option>
                            <option value="2">2마리 (+5,000원)</option>
                            <option value="3">3마리 (+10,000원)</option>
                        </select>
                    </div>

                    <div class="price-display">
                        <span class="label">예상 비용</span>
                        <span class="amount">0</span>
                        <span class="currency">원</span>
                        <div class="details">서비스를 선택해주세요.</div>
                    </div>

                    <button id="submit-booking" class="cta-button">
                        <span id="submit-text">예약 정보 입력하기</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <!-- 푸터 내용은 사장님의 기존 코드를 그대로 유지합니다. -->
        <p>&copy; 2025 펫시터의 정석. All Rights Reserved.</p>
    </footer>

    <!-- ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★-
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- HTML 요소들을 변수에 할당 ---
        const serviceSelect = document.getElementById('service');
        const startDateInput = document.getElementById('start-date');
        const endDateInput = document.getElementById('end-date');
        const timeSelect = document.getElementById('visit-time');
        const petCountSelect = document.getElementById('pet-count');
        const amountDisplay = document.querySelector('.price-display .amount');
        const detailsDisplay = document.querySelector('.price-display .details');
        const submitButton = document.getElementById('submit-booking');
        const submitText = document.getElementById('submit-text');

        // --- 방문 시간 옵션(00:00 ~ 23:30)을 자동으로 생성 ---
        function populateTimeSelect() {
            for (let i = 0; i < 24 * 2; i++) {
                const hours = Math.floor(i / 2);
                const minutes = (i % 2) * 30;
                const formattedHours = String(hours).padStart(2, '0');
                const formattedMinutes = String(minutes).padStart(2, '0');
                const timeValue = `${formattedHours}:${formattedMinutes}`;
                
                const option = document.createElement('option');
                option.value = timeValue;
                option.textContent = timeValue;
                timeSelect.appendChild(option);
            }
            timeSelect.value = "09:00"; // 기본 선택 시간
        }
        populateTimeSelect();

        // --- 날짜 선택의 최소값을 오늘로 설정 ---
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const todayString = `${yyyy}-${mm}-${dd}`;
        startDateInput.min = todayString;
        endDateInput.min = todayString;

        // --- 할증 기간 설정 (예시: 구정 연휴) ---
        const specialRatePeriods = [
            { start: '2025-01-28', end: '2025-02-03', name: '구정 연휴', rate: 1.2 } // 20% 할증
        ];

        // --- 핵심 가격 계산 함수 ---
        function calculatePrice() {
            const basePrice = parseFloat(serviceSelect.value) || 0;
            if (basePrice === 0) {
                amountDisplay.textContent = '0';
                detailsDisplay.textContent = '서비스를 선택해주세요.';
                return;
            }

            let finalPrice = basePrice;
            let detailText = ['기본 요금'];

            // 펫 수에 따른 추가 요금
            const petCount = parseInt(petCountSelect.value);
            if (petCount > 1) {
                const petSurcharge = (petCount - 1) * 5000;
                finalPrice += petSurcharge;
                detailText.push(`${petCount}마리 추가금`);
            }

            // 방문 기간에 따른 요금 (일수 계산)
            const startDate = new Date(startDateInput.value);
            const endDate = new Date(endDateInput.value);
            if (startDateInput.value && endDateInput.value && endDate >= startDate) {
                const diffTime = Math.abs(endDate - startDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                
                if (diffDays > 1) {
                    finalPrice = finalPrice * diffDays;
                    detailText.push(`${diffDays}일 방문`);
                }

                // 할증 기간 체크
                let isSpecialRateApplied = false;
                for (let i = 0; i < diffDays; i++) {
                    const currentDate = new Date(startDate);
                    currentDate.setDate(startDate.getDate() + i);
                    const currentDateString = currentDate.toISOString().split('T')[0];

                    for (const period of specialRatePeriods) {
                        if (currentDateString >= period.start && currentDateString <= period.end) {
                            if (!isSpecialRateApplied) {
                                finalPrice = finalPrice * period.rate; // 전체 금액에 할증률 적용 (정책에 따라 수정 가능)
                                detailText.push(`${period.name} 할증`);
                                isSpecialRateApplied = true;
                                break; 
                            }
                        }
                    }
                    if (isSpecialRateApplied) break;
                }
            }
            
            amountDisplay.textContent = Math.round(finalPrice);
            detailsDisplay.textContent = detailText.join(' + ');
        }

        // --- '예약하기' 버튼 클릭 시, Tally로 정보를 넘기는 핵심 로직 ---
        submitButton.addEventListener('click', (e) => {
            e.preventDefault(); // 버튼의 기본 동작(페이지 새로고침 등)을 막습니다.

            const finalPrice = amountDisplay.textContent.trim();
            const priceDetails = detailsDisplay.textContent.trim();
            
            if (!finalPrice || finalPrice === '0' || isNaN(parseFloat(finalPrice))) {
                alert('서비스 항목을 선택하고, 정확한 가격을 먼저 계산해주세요!');
                return;
            }

            const params = new URLSearchParams();
            const serviceOption = serviceSelect.options[serviceSelect.selectedIndex];
            params.append('service', serviceOption.dataset.serviceName || serviceOption.text);
            params.append('startDate', startDateInput.value);
            params.append('endDate', endDateInput.value);
            params.append('time', timeSelect.value);
            params.append('pets', petCountSelect.options[petCountSelect.selectedIndex].text);
            
            // ★★★ 핵심: 숨겨진 필드에 값을 채워넣습니다 ★★★
            params.append('price', finalPrice);     // 'price' 라는 숨겨진 필드에 최종 금액을 담는다.
            params.append('details', priceDetails); // 'details' 라는 숨겨진 필드에 상세 내역을 담는다.

            // (사장님의 Tally 폼 주소로 정확하게 기입해주세요)
            const tallyUrl = `https://tally.so/r/Pdp5qx?${params.toString( )}`;
            
            submitButton.disabled = true;
            submitText.textContent = '예약 페이지로 이동 중...';

            setTimeout(() => {
                window.location.href = tallyUrl;
            }, 1000);
        });

        // --- 입력 요소 값이 변경될 때마다 가격을 다시 계산 ---
        [serviceSelect, startDateInput, endDateInput, timeSelect, petCountSelect].forEach(el => {
            if (el) {
                el.addEventListener('change', calculatePrice);
            }
        });

        // --- 페이지 첫 로드 시 가격을 한번 계산 ---
        calculatePrice();
    });
    </script>

</body>
</html>
