<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 견적 및 예약 - 펫시터의 정석</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber-700: #b8860b;
            --amber-800: #8b6508;
            --amber-50: #fef3c7;
            --gray-100: #f3f4f6;
            --gray-600: #4b5563;
            --gray-900: #111827;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: linear-gradient(to bottom, #fff, #fff9e6 ); 
            color: var(--gray-900); 
            line-height: 1.7; 
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .calculator-wrapper {
            width: 100%;
            max-width: 500px;
        }
        .logo { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 1rem; }
        .logo a { color: inherit; text-decoration: none; }
        .calculator-box {
            background: white; border-radius: 1rem; padding: 1.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: left;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; color: var(--gray-900); }
        .form-group select, .form-group input {
            width: 100%; padding: 0.9rem; border: 1px solid #ddd;
            border-radius: 0.5rem; font-size: 1rem; appearance: none;
            background: var(--gray-100) url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23666%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22/%3E%3C/svg%3E' ) no-repeat right 1rem center;
            background-size: .65em auto;
        }
        .form-group input[type="date"], .form-group input[type="time"] { background-image: none; }

        .price-display {
            background: var(--amber-50); border-radius: 0.75rem; padding: 1.2rem;
            text-align: center; margin-top: 1.5rem;
        }
        .price-display .label { font-size: 1rem; color: var(--gray-600); }
        .price-display .amount { font-size: 2rem; font-weight: 900; color: var(--amber-700); }
        .price-display .surcharge-details { font-size: 0.85rem; color: var(--gray-600); margin-top: 0.5rem; }

        .submit-btn {
            display: block; width: 100%; background: var(--amber-700); color: white;
            padding: 1rem; border: none; border-radius: 0.75rem;
            font-size: 1.1rem; font-weight: 700; text-align: center;
            text-decoration: none; transition: background-color 0.3s; margin-top: 1.5rem;
            cursor: pointer;
        }
        .submit-btn:hover { background: var(--amber-800); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="calculator-wrapper">
        <div class="logo"><a href="index.html">🐾 펫시터의 정석</a></div>
        <div class="calculator-box">
            <div class="form-group">
                <label for="service">서비스 종류</label>
                <select id="service">
                    <option value="18000" data-service-name="방문 돌봄 30분">방문 돌봄 30분</option>
                    <option value="25000" data-service-name="방문 돌봄 60분" selected>방문 돌봄 60분</option>
                    <option value="32000" data-service-name="방문 돌봄 90분">방문 돌봄 90분</option>
                    <option value="39000" data-service-name="방문 돌봄 120분">방문 돌봄 120분</option>
                    <option value="50000" data-service-name="방문 목욕 (소형견)">방문 목욕 (소형견)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="visit-date">방문 날짜</label>
                <input type="date" id="visit-date">
            </div>
            <div class="form-group">
                <label for="visit-time">방문 시간</label>
                <input type="time" id="visit-time">
            </div>
            <div class="form-group">
                <label for="pet-count">반려동물 마리 수</label>
                <select id="pet-count">
                    <option value="1">1 마리</option>
                    <option value="2">2 마리 (+5,000원)</option>
                    <option value="3">3 마리 이상 (별도 협의)</option>
                </select>
            </div>
            <div class="price-display">
                <div class="label">예상 돌봄 비용</div>
                <div class="amount">0 원</div>
                <div class="surcharge-details"></div>
            </div>
            <button id="submit-booking" class="submit-btn">이 조건으로 예약하기</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const serviceSelect = document.getElementById('service');
            const dateInput = document.getElementById('visit-date');
            const timeInput = document.getElementById('visit-time');
            const petCountSelect = document.getElementById('pet-count');
            const amountDisplay = document.querySelector('.price-display .amount');
            const surchargeDisplay = document.querySelector('.price-display .surcharge-details');
            const submitButton = document.getElementById('submit-booking');

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            dateInput.min = `${yyyy}-${mm}-${dd}`;

            function calculatePrice() {
                const basePrice = parseInt(serviceSelect.value);
                const visitDateValue = dateInput.value;
                const visitTimeValue = timeInput.value;
                const petCount = parseInt(petCountSelect.value);

                if (petCount >= 3) {
                    amountDisplay.textContent = '별도 협의';
                    surchargeDisplay.textContent = '3마리 이상은 전화 문의 주세요.';
                    submitButton.disabled = true;
                    return;
                }
                
                submitButton.disabled = false;
                let surcharge = 0;
                let surchargeText = [];

                // 규칙 1: 다견/다묘 할증
                if (petCount > 1) {
                    surcharge += 5000;
                    surchargeText.push('다견/다묘 할증');
                }

                if (visitDateValue) {
                    const visitDate = new Date(visitDateValue);
                    const day = visitDate.getDay();
                    const todayForCalc = new Date();
                    todayForCalc.setHours(0, 0, 0, 0);

                    // 규칙 2: 당일 예약 할증
                    if (visitDate.getTime() === todayForCalc.getTime()) {
                        surcharge += 10000;
                        surchargeText.push('당일 할증');
                    }

                    // 규칙 3: 주말/공휴일 할증
                    if (day === 0 || day === 6) {
                        surcharge += 5000;
                        surchargeText.push('주말 할증');
                    }
                }

                if (visitTimeValue) {
                    const hour = parseInt(visitTimeValue.split(':')[0]);
                    // 규칙 4: 야간 할증
                    if (hour >= 20 || hour < 8) {
                        surcharge += 5000;
                        surchargeText.push('야간 할증');
                    }
                }

                const totalPrice = basePrice + surcharge;
                amountDisplay.textContent = `${totalPrice.toLocaleString()} 원`;
                surchargeDisplay.textContent = surchargeText.length > 0 ? `* 포함된 할증: ${surchargeText.join(', ')}` : '';
            }

            serviceSelect.addEventListener('change', calculatePrice);
            dateInput.addEventListener('change', calculatePrice);
            timeInput.addEventListener('change', calculatePrice);
            petCountSelect.addEventListener('change', calculatePrice);

            submitButton.addEventListener('click', () => {
                if (!dateInput.value || !timeInput.value) {
                    alert('방문 날짜와 시간을 모두 선택해주세요!');
                    return;
                }
                
                const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
                const serviceName = selectedOption.getAttribute('data-service-name');
                const finalPrice = amountDisplay.textContent;

                const params = new URLSearchParams();
                params.append('service', serviceName);
                params.append('date', dateInput.value);
                params.append('time', timeInput.value);
                params.append('pets', petCountSelect.options[petCountSelect.selectedIndex].text);
                params.append('price', finalPrice);

                window.location.href = `https://tally.so/r/Pdp5qx?${params.toString( )}`;
            });

            calculatePrice();
        });
    </script>
</body>
</html>
